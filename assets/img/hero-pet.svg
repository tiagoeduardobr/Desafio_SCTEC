<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">BytePets Cyber Pet</title>
  <desc id="desc">Mascote cyberpunk da BytePets: Um pet tecnológico com headset VR, imerso no universo geek.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#13233d"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0, 212, 255, 0.25)"/>
      <stop offset="100%" stop-color="rgba(8, 17, 31, 0)"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 212, 255, 0.05)" stroke-width="1"/>
    </pattern>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="60" fill="url(#bg)"/>
  <rect width="800" height="800" rx="60" fill="url(#grid)"/>
  
  <!-- Central Glow -->
  <circle cx="400" cy="400" r="350" fill="url(#glow)"/>

  <!-- Circuit Lines Background -->
  <g stroke="rgba(139, 92, 246, 0.4)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 100 200 L 250 200 L 300 250" />
    <circle cx="100" cy="200" r="8" fill="#8b5cf6"/>
    <path d="M 700 250 L 600 250 L 550 300 L 550 400" />
    <circle cx="700" cy="250" r="8" fill="#8b5cf6"/>
    <path d="M 150 600 L 250 600 L 300 550" />
    <circle cx="150" cy="600" r="8" fill="#00d4ff"/>
    <path d="M 650 650 L 550 650 L 480 580" />
    <circle cx="650" cy="650" r="8" fill="#00d4ff"/>
  </g>

  <!-- Cyber Pet Head Base -->
  <g transform="translate(400, 420)">
    <!-- Ears -->
    <path d="M -90 -120 L -140 -280 L -30 -160 Z" fill="#0f1b2e" stroke="url(#neonCyan)" stroke-width="8" stroke-linejoin="round" filter="url(#neonGlow)"/>
    <path d="M 90 -120 L 140 -280 L 30 -160 Z" fill="#0f1b2e" stroke="url(#neonCyan)" stroke-width="8" stroke-linejoin="round" filter="url(#neonGlow)"/>
    
    <!-- Inner Ear details -->
    <path d="M -110 -220 L -60 -150 M 110 -220 L 60 -150" stroke="url(#neonPurple)" stroke-width="6" stroke-linecap="round"/>

    <!-- Head Outline -->
    <path d="M -120 -50 C -150 50 -100 150 0 180 C 100 150 150 50 120 -50 C 100 -120 50 -150 0 -150 C -50 -150 -100 -120 -120 -50 Z" fill="#0c1524" stroke="url(#neonCyan)" stroke-width="8" filter="url(#neonGlow)"/>

    <!-- Snout / Muzzle -->
    <path d="M -60 50 Q 0 150 60 50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4"/>
    <!-- Nose -->
    <path d="M -30 60 L 30 60 L 0 90 Z" fill="url(#neonCyan)" filter="url(#neonGlow)"/>

    <!-- Robot lines on face -->
    <path d="M -80 0 L -40 40 M 80 0 L 40 40" stroke="url(#neonPurple)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0 -150 L 0 -100" stroke="url(#neonPurple)" stroke-width="5" stroke-linecap="round"/>

    <!-- VR Headset -->
    <g transform="translate(0, -50)">
      <rect x="-140" y="-45" width="280" height="90" rx="30" fill="#080e18" stroke="url(#neonPurple)" stroke-width="8" filter="url(#neonGlow)"/>
      <rect x="-120" y="-30" width="240" height="60" rx="20" fill="rgba(0, 212, 255, 0.15)"/>
      <!-- Digital Eyes inside VR -->
      <path d="M -80 0 Q -50 -30 -20 0" fill="none" stroke="#00d4ff" stroke-width="10" stroke-linecap="round" filter="url(#neonGlow)"/>
      <path d="M 20 0 Q 50 -30 80 0" fill="none" stroke="#00d4ff" stroke-width="10" stroke-linecap="round" filter="url(#neonGlow)"/>
      <!-- VR Highlights -->
      <path d="M -110 -20 L 110 -20" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Glowing Collar -->
    <path d="M -110 180 Q 0 240 110 180" fill="none" stroke="url(#neonPurple)" stroke-width="16" stroke-linecap="round" filter="url(#neonGlow)"/>
    <circle cx="0" cy="210" r="28" fill="#0c1524" stroke="url(#neonCyan)" stroke-width="8" filter="url(#neonGlow)"/>
    <!-- ByteTag inside collar -->
    <path d="M -12 195 L 12 195 L 18 225 L -18 225 Z" fill="url(#neonCyan)"/>
  </g>
</svg>
