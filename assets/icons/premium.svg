<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t d">
  <title id="t">Atendimento premium</title>
  <desc id="d">Ícone premium cyberpunk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#13233d"/>
    </linearGradient>
    <linearGradient id="nC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <linearGradient id="nP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="nG" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="none" stroke="url(#nP)" stroke-width="1" opacity="0.3"/>
  <circle cx="64" cy="64" r="40" fill="none" stroke="rgba(139, 92, 246, 0.2)" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- Tech Star / Diamond -->
  <path d="M 64 20 L 76 52 L 108 64 L 76 76 L 64 108 L 52 76 L 20 64 L 52 52 Z" fill="#0f1b2e" stroke="url(#nP)" stroke-width="4" stroke-linejoin="round" filter="url(#nG)"/>
  
  <!-- Inner Diamond -->
  <path d="M 64 40 L 72 64 L 64 88 L 56 64 Z" fill="none" stroke="url(#nC)" stroke-width="3" filter="url(#nG)"/>
  
  <!-- Sparkles -->
  <circle cx="30" cy="30" r="3" fill="url(#nC)" filter="url(#nG)"/>
  <circle cx="98" cy="30" r="3" fill="url(#nC)" filter="url(#nG)"/>
  <circle cx="30" cy="98" r="3" fill="url(#nC)" filter="url(#nG)"/>
  <circle cx="98" cy="98" r="3" fill="url(#nC)" filter="url(#nG)"/>
</svg>
