<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t d">
  <title id="t">Consultas e check-up</title>
  <desc id="d">Ícone médico cyberpunk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#13233d"/>
    </linearGradient>
    <linearGradient id="nC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <linearGradient id="nP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="nG" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="none" stroke="url(#nP)" stroke-width="1" opacity="0.3"/>
  <circle cx="64" cy="64" r="40" fill="none" stroke="rgba(139, 92, 246, 0.2)" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- Medical Cross -->
  <path d="M 54 30 L 74 30 L 74 54 L 98 54 L 98 74 L 74 74 L 74 98 L 54 98 L 54 74 L 30 74 L 30 54 L 54 54 Z" fill="#0f1b2e" stroke="url(#nC)" stroke-width="4" stroke-linejoin="round" filter="url(#nG)"/>
  
  <!-- Pulse Line -->
  <path d="M 20 64 L 40 64 L 52 40 L 76 88 L 88 64 L 108 64" fill="none" stroke="url(#nP)" stroke-width="4" stroke-linejoin="round" filter="url(#nG)"/>
  
  <!-- Nodes -->
  <circle cx="20" cy="64" r="3" fill="url(#nC)" filter="url(#nG)"/>
  <circle cx="108" cy="64" r="3" fill="url(#nC)" filter="url(#nG)"/>
</svg>
